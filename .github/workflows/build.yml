# ENET项目的GitHub Actions工作流
# 用于自动构建、打包和发布ENET客户端
name: Build ENET

# 触发条件：
# 1. 推送到master或main分支
# 2. 创建以v开头的标签（如v1.0.0）
# 3. 手动触发
on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.1)'
        required: true
        default: '1.0.0'
      release_type:
        description: '发布类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - beta
          - alpha

# 环境变量
env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: './ENET/ENET.csproj'  # 明确指定项目文件的相对路径
  SOLUTION_PATH: './ENET.sln'         # 明确指定解决方案文件的相对路径
  PUBLISH_DIR: './publish'
  PORTABLE_DIR: './portable/ENET'

# 工作流任务
jobs:
  # 构建任务
  build:
    name: Build and Package
    runs-on: windows-2019  # 使用稳定的Windows 2019运行器
    
    steps:
    # 步骤1: 检出代码
    - name: Checkout code
      uses: actions/checkout@v2  # 使用稳定的v2版本
    
    # 步骤2: 设置.NET环境
    - name: Setup .NET
      uses: actions/setup-dotnet@v2  # 使用稳定的v2版本
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    # 步骤3: 显示.NET信息
    - name: Display .NET information
      run: dotnet --info
    
    # 步骤4: 列出目录内容，帮助调试
    - name: List directory contents
      shell: pwsh
      run: |
        Write-Host "Current directory:"
        Get-ChildItem -Path . -Recurse | Where-Object { $_.Extension -match '\.(sln|csproj)$' }
        
        Write-Host "ENET project file content:"
        if (Test-Path ${{ env.PROJECT_PATH }}) {
            Get-Content ${{ env.PROJECT_PATH }}
        } else {
            Write-Host "Project file not found!"
        }
        
        Write-Host "Solution file content:"
        if (Test-Path ${{ env.SOLUTION_PATH }}) {
            Get-Content ${{ env.SOLUTION_PATH }}
        } else {
            Write-Host "Solution file not found!"
        }
    
    # 步骤5: 安装必要的NuGet包
    - name: Install required NuGet packages
      run: |
        dotnet add ${{ env.PROJECT_PATH }} package System.Windows.Forms
        dotnet add ${{ env.PROJECT_PATH }} package Microsoft.Windows.Compatibility
      continue-on-error: true
    
    # 步骤6: 还原NuGet包
    - name: Restore dependencies
      run: dotnet restore ${{ env.SOLUTION_PATH }}
      
    # 步骤7: 构建项目（使用详细输出以便调试）
    - name: Build project
      run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore --verbosity detailed
      continue-on-error: true  # 即使构建失败也继续执行，以便我们可以看到更多信息
    
    # 步骤8: 检查项目引用
    - name: Check project references
      shell: pwsh
      run: |
        Write-Host "Project references:"
        $projectContent = Get-Content ${{ env.PROJECT_PATH }}
        $projectContent | Where-Object { $_ -match "<Reference" -or $_ -match "<PackageReference" }
      continue-on-error: true
    
    # 步骤9: 尝试使用MSBuild直接构建
    - name: Try direct MSBuild build
      shell: pwsh
      run: |
        # 查找MSBuild路径
        $msbuildPath = (Get-Command msbuild -ErrorAction SilentlyContinue).Source
        if ($msbuildPath) {
            Write-Host "Using MSBuild from: $msbuildPath"
            & $msbuildPath ${{ env.SOLUTION_PATH }} /p:Configuration=Release /v:detailed
        } else {
            Write-Host "MSBuild not found in PATH"
        }
      continue-on-error: true
    
    # 步骤10: 发布项目（生成可执行文件）
    - name: Publish project
      run: |
        dotnet publish ${{ env.PROJECT_PATH }} -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ${{ env.PUBLISH_DIR }}
        # 显示发布目录内容
        dir ${{ env.PUBLISH_DIR }}
      continue-on-error: true  # 即使发布失败也继续执行
    
    # 步骤11: 创建便携版
    - name: Create portable version
      shell: pwsh
      run: |
        # 创建便携版目录
        New-Item -Path ${{ env.PORTABLE_DIR }} -ItemType Directory -Force
        
        # 检查发布目录是否存在
        if (Test-Path "${{ env.PUBLISH_DIR }}") {
            # 复制发布文件到便携版目录
            Copy-Item -Path "${{ env.PUBLISH_DIR }}/*" -Destination ${{ env.PORTABLE_DIR }} -Recurse -ErrorAction SilentlyContinue
            
            # 显示便携版目录内容
            dir ${{ env.PORTABLE_DIR }}
        } else {
            Write-Host "Publish directory not found, skipping portable version creation"
        }
      continue-on-error: true
    
    # 步骤12: 创建ZIP压缩包
    - name: Create ZIP archive
      shell: pwsh
      run: |
        if (Test-Path "${{ env.PORTABLE_DIR }}") {
            Compress-Archive -Path "${{ env.PORTABLE_DIR }}/*" -DestinationPath "./ENET_Portable.zip" -Force
            # 显示ZIP文件信息
            dir *.zip
        } else {
            Write-Host "Portable directory not found, skipping ZIP creation"
        }
      continue-on-error: true
    
    # 步骤13: 上传构建产物（不使用upload-artifact动作）
    - name: Prepare artifacts for release
      shell: pwsh
      run: |
        # 创建发布目录
        New-Item -Path "./release" -ItemType Directory -Force
        
        # 检查文件是否存在并复制
        if (Test-Path "${{ env.PUBLISH_DIR }}/ENET.exe") {
            Copy-Item -Path "${{ env.PUBLISH_DIR }}/ENET.exe" -Destination "./release/ENET.exe"
        } else {
            Write-Host "ENET.exe not found in publish directory"
        }
        
        if (Test-Path "./ENET_Portable.zip") {
            Copy-Item -Path "./ENET_Portable.zip" -Destination "./release/ENET_Portable.zip"
        } else {
            Write-Host "ENET_Portable.zip not found"
        }
        
        # 显示发布目录内容
        dir ./release
      continue-on-error: true
    
    # 步骤14: 从标签创建发布
    - name: Create release from tag
      if: startsWith(github.ref, 'refs/tags/v')
      uses: ncipollo/release-action@v1  # 使用替代的发布动作
      with:
        artifacts: "./release/ENET.exe,./release/ENET_Portable.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false
        name: "Release ${{ github.ref_name }}"
        body: "ENET客户端 ${{ github.ref_name }} 发布版本"
      continue-on-error: true
    
    # 步骤15: 从手动触发创建发布
    - name: Create release from manual trigger
      if: github.event_name == 'workflow_dispatch'
      uses: ncipollo/release-action@v1  # 使用替代的发布动作
      with:
        artifacts: "./release/ENET.exe,./release/ENET_Portable.zip"
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "v${{ github.event.inputs.version }}"
        name: "Release v${{ github.event.inputs.version }}"
        body: "ENET客户端 v${{ github.event.inputs.version }} ${{ github.event.inputs.release_type }}版本"
        draft: false
        prerelease: ${{ github.event.inputs.release_type != 'release' }}
      continue-on-error: true
