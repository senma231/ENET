# ENET项目的GitHub Actions工作流
# 用于自动构建、打包和发布ENET客户端
name: Build ENET

# 触发条件：
# 1. 推送到master或main分支
# 2. 创建以v开头的标签（如v1.0.0）
# 3. 手动触发
on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: 1.0.1)'
        required: true
        default: '1.0.0'
      release_type:
        description: '发布类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - beta
          - alpha

# 工作流任务
jobs:
  # 构建任务
  build:
    name: Build and Package
    runs-on: windows-2019  # 使用稳定的Windows 2019运行器
    
    steps:
    # 步骤1: 检出代码
    - name: Checkout code
      uses: actions/checkout@v2  # 使用稳定的v2版本
    
    # 步骤2: 设置.NET环境
    - name: Setup .NET
      uses: actions/setup-dotnet@v2  # 使用稳定的v2版本
      with:
        dotnet-version: 8.0.x
    
    # 步骤3: 显示.NET信息和目录结构
    - name: Display environment info
      shell: pwsh
      run: |
        dotnet --info
        
        Write-Host "Current directory structure:"
        Get-ChildItem -Path . -Recurse -Depth 2 | Select-Object FullName
        
        Write-Host "Solution and project files:"
        Get-ChildItem -Path . -Recurse -Include *.sln,*.csproj | Select-Object FullName
    
    # 步骤4: 尝试使用MSBuild直接构建
    - name: Build with MSBuild
      shell: pwsh
      run: |
        # 查找所有的.csproj文件
        $csprojFiles = Get-ChildItem -Path . -Recurse -Include *.csproj | Select-Object -ExpandProperty FullName
        
        foreach ($proj in $csprojFiles) {
            Write-Host "Building project: $proj"
            dotnet msbuild $proj /p:Configuration=Release /p:Platform="Any CPU" /p:UseSharedCompilation=false /p:TargetFramework=net8.0-windows
        }
      continue-on-error: true
    
    # 步骤5: 尝试使用dotnet publish构建
    - name: Publish with dotnet
      shell: pwsh
      run: |
        # 查找所有的.csproj文件
        $csprojFiles = Get-ChildItem -Path . -Recurse -Include *.csproj | Select-Object -ExpandProperty FullName
        
        foreach ($proj in $csprojFiles) {
            Write-Host "Publishing project: $proj"
            dotnet publish $proj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o "./publish"
        }
      continue-on-error: true
    
    # 步骤6: 检查发布目录
    - name: Check publish directory
      shell: pwsh
      run: |
        if (Test-Path "./publish") {
            Write-Host "Publish directory contents:"
            Get-ChildItem -Path "./publish" -Recurse | Select-Object FullName
        } else {
            Write-Host "Publish directory not found"
        }
    
    # 步骤7: 创建便携版
    - name: Create portable version
      shell: pwsh
      run: |
        # 查找可执行文件
        $exeFiles = Get-ChildItem -Path . -Recurse -Include *.exe | Where-Object { $_.Name -match "ENET" } | Select-Object -ExpandProperty FullName
        
        if ($exeFiles.Count -gt 0) {
            Write-Host "Found executable files:"
            $exeFiles
            
            # 创建便携版目录
            $portableDir = "./portable/ENET"
            New-Item -Path $portableDir -ItemType Directory -Force
            
            # 复制第一个找到的可执行文件
            $mainExe = $exeFiles[0]
            Copy-Item -Path $mainExe -Destination "$portableDir/"
            
            # 复制其他必要文件
            $exeDir = Split-Path -Parent $mainExe
            Copy-Item -Path "$exeDir/*.dll" -Destination "$portableDir/" -ErrorAction SilentlyContinue
            Copy-Item -Path "$exeDir/*.config" -Destination "$portableDir/" -ErrorAction SilentlyContinue
            Copy-Item -Path "LICENSE" -Destination "$portableDir/" -ErrorAction SilentlyContinue
            Copy-Item -Path "README.md" -Destination "$portableDir/" -ErrorAction SilentlyContinue
            
            Write-Host "Portable directory contents:"
            Get-ChildItem -Path $portableDir -Recurse | Select-Object FullName
            
            # 创建ZIP压缩包
            Compress-Archive -Path "$portableDir/*" -DestinationPath "./ENET_Portable.zip" -Force
            
            Write-Host "ZIP file created:"
            Get-ChildItem -Path . -Include *.zip | Select-Object FullName
        } else {
            Write-Host "No executable files found"
        }
      continue-on-error: true
    
    # 步骤8: 准备发布文件
    - name: Prepare release files
      shell: pwsh
      run: |
        # 创建发布目录
        $releaseDir = "./release"
        New-Item -Path $releaseDir -ItemType Directory -Force
        
        # 查找可执行文件
        $exeFiles = Get-ChildItem -Path . -Recurse -Include *.exe | Where-Object { $_.Name -match "ENET" } | Select-Object -ExpandProperty FullName
        
        if ($exeFiles.Count -gt 0) {
            # 复制第一个找到的可执行文件
            $mainExe = $exeFiles[0]
            Copy-Item -Path $mainExe -Destination "$releaseDir/ENET.exe"
        }
        
        # 复制ZIP文件
        $zipFiles = Get-ChildItem -Path . -Include *.zip | Select-Object -ExpandProperty FullName
        
        if ($zipFiles.Count -gt 0) {
            Copy-Item -Path $zipFiles[0] -Destination "$releaseDir/ENET_Portable.zip"
        }
        
        Write-Host "Release directory contents:"
        Get-ChildItem -Path $releaseDir -Recurse | Select-Object FullName
        
        # 创建文件列表
        $artifactsList = @()
        
        if (Test-Path "$releaseDir/ENET.exe") {
            $artifactsList += "$releaseDir/ENET.exe"
        }
        
        if (Test-Path "$releaseDir/ENET_Portable.zip") {
            $artifactsList += "$releaseDir/ENET_Portable.zip"
        }
        
        # 保存文件列表到环境变量
        echo "ARTIFACTS_LIST=$($artifactsList -join ',')" >> $env:GITHUB_ENV
      continue-on-error: true
    
    # 步骤9: 从标签创建发布
    - name: Create release from tag
      if: startsWith(github.ref, 'refs/tags/v') && env.ARTIFACTS_LIST != ''
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ env.ARTIFACTS_LIST }}
        token: ${{ secrets.GITHUB_TOKEN }}
        draft: false
        prerelease: false
        name: "Release ${{ github.ref_name }}"
        body: "ENET客户端 ${{ github.ref_name }} 发布版本"
      continue-on-error: true
    
    # 步骤10: 从手动触发创建发布
    - name: Create release from manual trigger
      if: github.event_name == 'workflow_dispatch' && env.ARTIFACTS_LIST != ''
      uses: ncipollo/release-action@v1
      with:
        artifacts: ${{ env.ARTIFACTS_LIST }}
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: "v${{ github.event.inputs.version }}"
        name: "Release v${{ github.event.inputs.version }}"
        body: "ENET客户端 v${{ github.event.inputs.version }} ${{ github.event.inputs.release_type }}版本"
        draft: false
        prerelease: ${{ github.event.inputs.release_type != 'release' }}
      continue-on-error: true
